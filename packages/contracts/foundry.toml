[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.28"
optimizer = true
optimizer_runs = 200
via_ir = false
fs_permissions = [{ access = "read", path = "./" }]

[profile.ci]
fuzz = { runs = 5000 }
invariant = { runs = 256, depth = 256 }

[rpc_endpoints]
robinhood_testnet = "${ROBINHOOD_RPC_URL}"
arbitrum_sepolia = "${ARBITRUM_SEPOLIA_RPC_URL}"

[etherscan]
robinhood_testnet = { key = "anything", url = "https://explorer.testnet.chain.robinhood.com/api/", chain = 46630 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
int_types = "long"
