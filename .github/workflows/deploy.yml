name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Build + Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      CF_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CF_ACCOUNT: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - name: Check Cloudflare credentials
        id: check
        run: |
          if [ -z "$CF_TOKEN" ] || [ -z "$CF_ACCOUNT" ]; then
            echo "::notice title=Cloudflare not configured::CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID are not set in repo secrets. Skipping deploy. Run: gh secret set CLOUDFLARE_API_TOKEN to enable auto-deploy."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - if: steps.check.outputs.skip != 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.13'

      - if: steps.check.outputs.skip != 'true'
        name: Install dependencies
        run: bun install --frozen-lockfile

      - if: steps.check.outputs.skip != 'true'
        name: Build for Cloudflare Pages (next-on-pages)
        working-directory: packages/app
        run: bunx @cloudflare/next-on-pages

      - if: steps.check.outputs.skip != 'true'
        name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: packages/app
          command: |
            pages deploy .vercel/output/static
              --project-name=speakup
              --branch=${{ github.head_ref || github.ref_name }}
              --commit-hash=${{ github.sha }}
              --commit-message=${{ github.event.head_commit.message }}
